        { key:'none',     sym:'×', label:'未着手', bg:'#FFEBEE', color:'#C62828' },
        { key:'learning', sym:'△', label:'学習中',  bg:'#FFFDE7', color:'#F57F17' },
        { key:'done',     sym:'○', label:'習得済み', bg:'#E8F5E9', color:'#2E7D32' },
        { key:'approved', sym:'◎', label:'確認済み', bg:'#E3F2FD', color:'#1565C0' },
      ];
      const btns = STATUSES.map(s => `
        <button style="background:${s.bg};color:${s.color};border:1.5px solid ${s.color};
          border-radius:8px;padding:6px 10px;cursor:pointer;font-size:12px;font-weight:700;
          ${currentStatus===s.key?'outline:2px solid '+s.color+';outline-offset:1px':''}"
          onclick="updateSkillStatus(${userId},${categoryId},'${s.key}')">${s.sym} ${s.label}</button>`
      ).join('');
      const pop = document.createElement('div');
      pop.className = 'skill-popover'; pop.id = 'skill-popover';
      pop.style.cssText = 'min-width:200px';
      pop.innerHTML = `
        <div class="skill-popover-title">${staffName} × ${catName}</div>
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px">ステータスを選択：</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">${btns}</div>
        <button class="btn-popover-close" style="margin-top:8px" onclick="closePopover()">閉じる</button>`;
      const r = event.currentTarget.getBoundingClientRect();
      pop.style.left = `${Math.min(r.left, window.innerWidth-220)}px`;
      pop.style.top  = `${r.bottom+6}px`;
      document.body.appendChild(pop);
      setTimeout(() => document.addEventListener('click', closePopover, {once:true}), 10);
    }

    function updateSkillStatus(userId, categoryId, status) {
      const e = SKILL_MAP.find(sm => sm.userId===userId && sm.categoryId===categoryId);
      if (e) e.status = status;
      else SKILL_MAP.push({userId, categoryId, status});
      closePopover(); renderSkillmap();
    }

    /* ---- タスク管理 ---- */
    function renderTaskMgmt() {
      const content    = document.getElementById('main-content');
      const storeStaff = USERS.filter(u => u.role==='staff' && u.store===currentUser.store);

      const staffChecks = storeStaff.map(u => `
        <div class="staff-check-item ${selectedStaffs.has(u.id)?'selected':''}"
          onclick="toggleStaff(${u.id})">
          <i class="fa-${selectedStaffs.has(u.id)?'solid':'regular'} fa-square-check"></i>${u.name}
        </div>`).join('');

      const items = taskContentType === 'video'
        ? VIDEOS.filter(v=>v.published) : RECIPES;
      const contentChecks = items.map(item => {
        const title = taskContentType==='video' ? item.title
          : (typeof item.title==='object' ? item.title[currentLang]||item.title.ja : item.title);
        const sel = selectedContents.has(item.id);
        return `<div class="content-check-item ${sel?'selected':''}" onclick="toggleContent(${item.id})">
          <i class="fa-${sel?'solid':'regular'} fa-square-check"></i>${title}
          ${taskContentType==='video'?`<span style="font-size:11px;color:var(--text-muted);margin-left:auto">${item.category}</span>`:''}
        </div>`;
      }).join('');

      const selCount = selectedStaffs.size * selectedContents.size;

      const formInner = taskFormOpen ? `
        <div class="task-accordion-body">
          <div style="font-size:12px;color:var(--text-muted);margin-bottom:6px">① スタッフを選択</div>
          <div class="staff-check-list" style="max-height:200px;overflow-y:auto">${staffChecks}</div>
          <button class="btn-select-all" style="margin-bottom:12px"
            onclick="${storeStaff.map(u=>u.id).join(',') ? `[${storeStaff.map(u=>u.id)}].forEach(id=>selectedStaffs.add(id));renderTaskMgmt()` : ''}">全員選択</button>
          <div style="font-size:12px;color:var(--text-muted);margin-bottom:6px">② コンテンツを選択</div>
          <div class="content-tabs">
            <button class="content-tab ${taskContentType==='video'?'active':''}" onclick="switchTaskContent('video')">動画</button>
            <button class="content-tab ${taskContentType==='recipe'?'active':''}" onclick="switchTaskContent('recipe')">レシピ</button>
          </div>
          <div class="content-check-list" style="max-height:200px;overflow-y:auto">${contentChecks}</div>
          <div style="font-size:12px;color:var(--text-muted);margin:10px 0 6px">③ 期日</div>
          <input type="date" class="date-input" value="${taskDueDateVal}" onchange="taskDueDateVal=this.value">
          <div class="selected-count">${selCount>0?selCount+' 件送信予定':'送信先を選択してください'}</div>
          <div style="display:flex;gap:10px;margin-top:12px">
            <button class="btn-submit-task" style="flex:1" onclick="submitTasks()">送信する</button>
            <button class="btn-secondary" onclick="taskFormOpen=false;selectedStaffs.clear();selectedContents.clear();renderTaskMgmt()">キャンセル</button>
          </div>
        </div>` : '';

      let filteredTasks = TASKS.filter(tk => storeStaff.some(u => u.id===tk.assignedTo));
      if (taskTab !== 'all') filteredTasks = filteredTasks.filter(tk => tk.status===taskTab);

      const STATUS_BG = { unwatched:'#F3F4F6', watched:'var(--info-light)', confirmed:'var(--success-light)' };
      const taskCards = filteredTasks.length ? filteredTasks.map(tk => {
        const staff = USERS.find(u => u.id===tk.assignedTo);
        const bg = STATUS_BG[tk.status] || '#F3F4F6';
        return `<div class="task-card" style="background:${bg}">
          <div class="task-card-info">
            <div class="task-card-title">${tk.title}${tk.priority?'<span style="margin-left:6px;font-size:10px;background:var(--accent);color:white;padding:2px 6px;border-radius:4px">優先</span>':''}</div>
            <div class="task-card-meta">${staff?staff.name:'?'} · 期日: ${tk.dueDate}</div>
          </div>
          <select class="task-status-select" onchange="updateTaskStatus(${tk.id},this.value)"
            style="background:${bg}">
            <option value="unwatched" ${tk.status==='unwatched'?'selected':''}>未視聴</option>
            <option value="watched"   ${tk.status==='watched'  ?'selected':''}>視聴済み</option>
            <option value="confirmed" ${tk.status==='confirmed'?'selected':''}>確認済み</option>
          </select>
        </div>`;
      }).join('') : '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px">タスクがありません</div>';

      content.innerHTML = `
        <div class="task-form-card" style="padding:0;overflow:hidden">
          <button class="task-accordion-btn ${taskFormOpen?'open':''}" onclick="taskFormOpen=!taskFormOpen;renderTaskMgmt()">
            <i class="fa-solid fa-${taskFormOpen?'minus':'plus'}"></i> タスクを送る
          </button>
          ${formInner}
        </div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:20px;margin-top:16px">
          <div class="form-section-title">送信済みタスク</div>
          <div class="status-tabs">
            ${['all','unwatched','watched','confirmed'].map(s =>
              `<button class="status-tab ${taskTab===s?'active':''}" onclick="taskTab='${s}';renderTaskMgmt()">
                ${s==='all'?'すべて':t(s)}</button>`).join('')}
          </div>
          <div class="task-list">${taskCards}</div>
        </div>`;
    }

    function toggleStaff(id) {
      selectedStaffs.has(id) ? selectedStaffs.delete(id) : selectedStaffs.add(id);
      renderTaskMgmt();
    }
    function switchTaskContent(type) {
      taskContentType = type; selectedContents.clear(); renderTaskMgmt();
    }
    function toggleContent(id) {
      selectedContents.has(id) ? selectedContents.delete(id) : selectedContents.add(id);
      renderTaskMgmt();
    }
    function updateTaskStatus(taskId, newStatus) {
      const task = TASKS.find(t => t.id === taskId);
      if (task) task.status = newStatus;
      renderTaskMgmt();
    }
    function submitTasks() {
      if (!selectedStaffs.size)   { showToast('スタッフを選択してください');   return; }
      if (!selectedContents.size) { showToast('コンテンツを選択してください'); return; }
      if (!taskDueDateVal)        { showToast('期日を設定してください');        return; }
      const total = selectedStaffs.size * selectedContents.size;
      selectedStaffs.forEach(staffId => {
        selectedContents.forEach(contentId => {
          const isVideo = VIDEOS.some(v=>v.id===contentId);
          const item = isVideo ? VIDEOS.find(v=>v.id===contentId) : RECIPES.find(r=>r.id===contentId);
          const title = typeof item?.title==='object' ? item.title.ja : (item?.title||'タスク');
          TASKS.push({
            id: Date.now() + Math.random(),
            title, type: isVideo ? 'video' : 'recipe',
            contentId, assignedTo: staffId,
            status: 'unwatched', dueDate: taskDueDateVal,
            priority: true,
          });
        });
        NOTIFICATIONS.push({
          id: Date.now() + Math.random(),
          type: 'task', userId: staffId,
          message: 'タスクが届いています。確認しましょう',
          createdAt: new Date().toISOString().split('T')[0],
          read: false,
        });
      });
      selectedStaffs.clear(); selectedContents.clear();
      taskDueDateVal = ''; taskFormOpen = false;
      showToast(`${total}件のタスクを送信しました ✅`);
      renderTaskMgmt(); renderAllVideoViews();
    }
    function confirmTask(taskId) {
      const tk = TASKS.find(t=>t.id===taskId);
      if (tk) tk.status = 'confirmed';
      renderTaskMgmt(); showToast('確認済みにしました ✅');
    }

    /* ---- 従業員追加 ---- */

      const rows = staffList.map(u => {
        const editing  = editingEmpId === u.id;
        const joinCell = u.joinDate ? `${u.joinDate}（${getDaysElapsed(u.joinDate)}日目）` : '-';
        return `<tr>
          <td>${editing
            ? `<input class="inline-edit-input" id="edit-name-${u.id}" value="${u.name}">`
            : u.name}</td>
          <td>${u.store}</td>
          <td style="font-size:12px">${joinCell}</td>
          <td>${editing
            ? `<button class="btn-edit-emp" onclick="saveEmpName(${u.id})" style="color:var(--success)">保存</button>`
            : `<button class="btn-edit-emp" onclick="editingEmpId=${u.id};renderAddEmployee()">編集</button>`}
          </td>
        </tr>`;
      }).join('');

      content.innerHTML = `
        <div class="page-card" style="margin-bottom:20px">
          <div class="page-card-title">スタッフを登録する</div>
          <div class="add-employee-form">
            <div class="form-group">
              <label class="form-label">名前 *</label>
              <input class="form-input" id="emp-name" placeholder="田中太郎">

            <div class="form-group">
              <label class="form-label">所属店舗</label>
              <select class="form-select" id="emp-store">
                ${stores.map(s=>`<option value="${s}">${s}</option>`).join('')}
              </select>
            </div>

              <label class="form-label">入社日</label>
              <input class="form-input" type="date" id="emp-joined">

            <div class="form-group">
              <button class="btn-register" onclick="registerEmployee()">登録する</button>
            </div>
          </div>
        </div>
        <div class="page-card">
          <div class="page-card-title">登録済みスタッフ一覧</div>
          <table class="employee-table">
            <thead><tr><th>名前</th><th>所属店舗</th><th>入社日・経過日数</th><th>操作</th></tr></thead>
            <tbody>${rows}</tbody>

    function registerEmployee() {
      const name  = document.getElementById('emp-name')?.value.trim();
      const store = document.getElementById('emp-store')?.value;
      if (!name) { showToast('名前を入力してください'); return; }
      const newId = Math.max(...USERS.map(u=>u.id), 0) + 1;
      const joinDate = document.getElementById('emp-joined')?.value || new Date().toISOString().slice(0,10);
      USERS.push({id:newId, name, role:'staff', store, lang:'ja',
        joinedHours:0, mastery:0, position:'', joinDate,
        lastLogin: joinDate,
        skills:{"焼き":0,"一品":0,"ホール":0,"ドリンク":0,"仕込み":0,"店長業務":0}});
      SKILL_CATEGORIES.forEach(cat => SKILL_MAP.push({userId:newId, categoryId:cat.id, status:'none'}));
      showToast(`${name} を登録しました ✅`); renderAddEmployee();
    }
    function saveEmpName(userId) {
      const input = document.getElementById(`edit-name-${userId}`);
      const user  = USERS.find(u => u.id===userId);
      if (input && user) user.name = input.value.trim() || user.name;
      editingEmpId = null; renderAddEmployee(); showToast('保存しました');
    }

    /* ---- コンテンツ改善リクエスト（旧：本部FBシステム） ---- */
    let fbContentType = 'video';  // 'video' or 'recipe'

    function renderFbSystem() {
      const content = document.getElementById('main-content');
      const myFbs   = FEEDBACKS.filter(fb => fb.fromManager === currentUser.name && fb.type === 'content_request');
      const stores  = [...new Set(USERS.map(u=>u.store).filter(Boolean))];

      const fbCards = myFbs.length ? myFbs.map(fb => `
        <div class="fb-card">
          <div style="flex:1">
            <div class="fb-card-title">${fb.staffName||'(未指定)'} — ${fb.contentType==='video'?'動画':'レシピ'}</div>
            <div class="fb-card-meta">${fb.detail} · 期日: ${fb.deadline||'-'}</div>
          </div>
          <span class="fb-status-badge ${fb.status==='対応済み'?'fb-resolved':'fb-pending'}">${fb.status}</span>
        </div>`).join('')
        : '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px">送信済みのリクエストはありません</div>';

      const dropdown = fbSearchResults.length
        ? `<div class="fb-search-dropdown">
            ${fbSearchResults.map(u =>
              `<div class="fb-search-item" onclick="selectFbStaff(${u.id},'${u.name}')">${u.name}（${u.store}）</div>`
            ).join('')}
           </div>` : '';

      content.innerHTML = `
        <div class="page-card" style="margin-bottom:20px">
          <div class="page-card-title">コンテンツ改善リクエストを送る</div>
          <div class="fb-form">
            <div class="form-group">
              <label class="form-label">① 従業員名 <span style="color:var(--danger);margin-left:2px">*</span></label>
              <div class="fb-search-wrap" style="position:relative">
                <input class="fb-search-input" id="fb-staff-input"
                  placeholder="名前で検索..."
                  oninput="fbSearch(this.value)">
                ${dropdown}
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">② 店舗</label>
              <select class="form-select" id="fb-store">
                ${stores.map(s=>`<option value="${s}" ${fbStoreVal===s?'selected':''}>${s}</option>`).join('')}
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">③ コンテンツ種別</label>
              <div style="display:flex;gap:16px;margin-top:4px">
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px">
                  <input type="radio" name="fb-content-type" value="video" ${fbContentType==='video'?'checked':''}
                    onchange="fbContentType='video'"> 動画
                </label>
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px">
                  <input type="radio" name="fb-content-type" value="recipe" ${fbContentType==='recipe'?'checked':''}
                    onchange="fbContentType='recipe'"> レシピ
                </label>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">④ 対応詳細 *</label>
              <textarea class="form-textarea" id="fb-detail" placeholder="改善内容を入力...">${fbDetailVal}</textarea>
            </div>
            <div class="form-group">
              <label class="form-label">⑤ 対応期日</label>
              <input type="date" class="form-input" id="fb-deadline" value="${fbDeadlineVal}">
            </div>
            <div class="form-group">
              <label class="form-label">⑥ 備考（任意）</label>
              <textarea class="form-textarea" id="fb-note" placeholder="備考...">${fbNoteVal}</textarea>
            </div>
            <div class="form-group">
              <label class="form-label">⑦ 添付ファイル（任意）</label>
              <input type="file" accept="image/*,video/*" multiple
                onchange="handleFbAttachment(this)"
                style="font-size:12px;margin-bottom:8px">
              <div id="fb-attachment-preview">${renderFbAttachmentPreviewHtml()}</div>
            </div>
            <button class="fb-submit-btn" onclick="submitFb()"><i class="fa-solid fa-paper-plane"></i> 送信する</button>
          </div>
        </div>
        <div class="page-card">
          <div class="page-card-title">コンテンツ改善リクエスト一覧</div>
          ${fbCards}
        </div>`;

      // 従業員名を直接DOM操作で設定（value属性のバグ回避）
      const input = document.getElementById('fb-staff-input');
      if (input && fbStaffQuery) input.value = fbStaffQuery;
    }

    function fbSearch(query) {
      fbStaffQuery    = query;
      fbSearchResults = query.length >= 1
        ? USERS.filter(u => u.name.includes(query)).slice(0,5) : [];
      // ドロップダウンのみ更新（inputの値は保持）
      const wrap = document.querySelector('.fb-search-wrap');
      if (wrap) {
        const existing = wrap.querySelector('.fb-search-dropdown');
        if (existing) existing.remove();
        if (fbSearchResults.length) {
          const dd = document.createElement('div');
          dd.className = 'fb-search-dropdown';
          dd.innerHTML = fbSearchResults.map(u =>
            `<div class="fb-search-item" onclick="selectFbStaff(${u.id},'${u.name}')">${u.name}（${u.store}）</div>`
          ).join('');
          wrap.appendChild(dd);
        }
      }
    }
    function selectFbStaff(id, name) {
      fbStaffQuery = name; fbSearchResults = [];
      const input = document.getElementById('fb-staff-input');
      if (input) input.value = name;
      const dd = document.querySelector('.fb-search-dropdown');
      if (dd) dd.remove();
    }
    function handleFbImage(input) {
      const file = input.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = e => { fbImageBase64 = e.target.result; };
      reader.readAsDataURL(file);
    }
    function handleFbAttachment(input) {
      const files = Array.from(input.files);
      files.forEach(file => {
        const reader = new FileReader();
        reader.onload = e => {
          fbAttachments.push({
            name: file.name,
            type: file.type.startsWith('image/') ? 'image' : 'video',
            data: e.target.result,
          });
          const preview = document.getElementById('fb-attachment-preview');
          if (preview) preview.innerHTML = renderFbAttachmentPreviewHtml();
        };
        reader.readAsDataURL(file);
      });
    }

    function renderFbAttachmentPreviewHtml() {
      if (!fbAttachments.length) return '';
      return `<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px">` +
        fbAttachments.map((f, i) => `
          <div style="position:relative;border:1px solid var(--border);border-radius:6px;padding:6px 10px;
            display:flex;align-items:center;gap:6px;font-size:12px;background:var(--bg)">
            ${f.type==='image'
              ? `<img src="${f.data}" style="width:40px;height:30px;object-fit:cover;border-radius:3px">`
              : `<i class="fa-solid fa-video" style="color:var(--primary)"></i>`}
            <span style="max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.name}</span>
            <button onclick="fbAttachments.splice(${i},1);const p=document.getElementById('fb-attachment-preview');if(p)p.innerHTML=renderFbAttachmentPreviewHtml()"
              style="background:none;border:none;cursor:pointer;color:var(--danger);font-size:14px;padding:0;line-height:1">✕</button>
          </div>`).join('') + `</div>`;
    }

    function submitFb() {
      const staffInput = document.getElementById('fb-staff-input');
      const staffName  = staffInput ? staffInput.value.trim() : fbStaffQuery;
      const detail     = document.getElementById('fb-detail')?.value.trim();
      const errors = [];
      if (!staffName) errors.push('従業員名は必須です');
      if (!detail)    errors.push('対応詳細は必須です');
      if (errors.length) { showToast(errors[0]); return; }
      const newId = Math.max(...FEEDBACKS.map(f=>f.id), 0) + 1;
      FEEDBACKS.push({
        id: newId,
        type: 'content_request',
        staffName,
        store:    document.getElementById('fb-store')?.value || '',
        contentType: fbContentType,
        detail,
        deadline: document.getElementById('fb-deadline')?.value || '',
        status:   '未対応',
        createdAt: new Date().toISOString().slice(0,10),
        fromManager: currentUser.name,
        note: document.getElementById('fb-note')?.value || '',
        attachments: [...fbAttachments],
      });
      fbStaffQuery=''; fbSearchResults=[]; fbStoreVal=''; fbGenreVal='';
      fbDetailVal=''; fbDeadlineVal=''; fbNoteVal=''; fbImageBase64='';
      fbAttachments=[];
      showToast('送信しました ✅'); renderFbSystem();
    }

    /* ---- トースト ---- */
    function showToast(msg) {
      const ex = document.getElementById('toast'); if (ex) ex.remove();
      const el = document.createElement('div');
      el.className = 'toast'; el.id = 'toast'; el.textContent = msg;
      document.body.appendChild(el);

           </div>`;

      content.innerHTML = `

    function renderChatBubble(role, content) {
      if (role === 'user') {
        return `<div class="chat-msg user"><div class="chat-bubble">${escHtml(content)}</div></div>`;
      }
      return `<div class="chat-msg ai">
        <div class="chat-ai-icon"><i class="fa-solid fa-robot" style="color:var(--primary)"></i></div>
        <div class="chat-bubble">${escHtml(content)}</div>
      </div>`;
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function scrollChat() {
      requestAnimationFrame(() => {
        const area = document.getElementById('chat-area');
        if (area) area.scrollTop = area.scrollHeight;
      });
    }

    function saveApiKey() {
      const val = document.getElementById('apikey-input')?.value.trim();
      if (!val) return;
      localStorage.setItem('claude_api_key', val);
      renderAicoach();
    }

    function clearApiKey() {
      localStorage.removeItem('claude_api_key');
      chatHistory = [];
      renderAicoach();
    }

    async function sendMessage(text) {
      if (aiLoading) return;
      const input = document.getElementById('chat-input');
      const msg   = text || (input && input.value.trim());
      if (!msg) return;
      if (input) input.value = '';

      chatHistory.push({ role: 'user', content: msg });

      const area = document.getElementById('chat-area');
      if (area) {
        area.innerHTML += renderChatBubble('user', msg);
        area.innerHTML += `<div class="chat-msg ai" id="typing-indicator">
          <div class="chat-ai-icon"><i class="fa-solid fa-robot" style="color:var(--primary)"></i></div>
          <div class="chat-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>
        </div>`;
        scrollChat();
      }

      const sendBtn = document.getElementById('send-btn');
      if (sendBtn) sendBtn.disabled = true;
      aiLoading = true;

      const reply = await sendToAI(msg);
      chatHistory.push({ role: 'assistant', content: reply });

      const indicator = document.getElementById('typing-indicator');
      if (indicator) indicator.remove();

      if (area) {
        area.innerHTML += renderChatBubble('ai', reply);
        scrollChat();
      }

      aiLoading = false;
      if (sendBtn) sendBtn.disabled = false;
      if (input)   input.focus();
    }

    async function sendToAI(userMessage) {
      const apiKey = localStorage.getItem('claude_api_key');
      if (!apiKey) return 'APIキーを設定してください。';

      const recipeCtx = RECIPES.map(r => {
        const title = typeof r.title === 'object' ? r.title[currentLang] || r.title.ja : r.title;
        const ing   = typeof r.ingredients === 'object' ? r.ingredients[currentLang] || r.ingredients.ja : '';
        const steps = typeof r.steps === 'object' ? r.steps[currentLang] || r.steps.ja : '';
        return `【${title}】食材:${ing} 手順:${steps}`;
      }).join('\n');

      const videoCtx = VIDEOS.map(v =>
        `【${v.title}】カテゴリ:${v.category} 説明:${v.description || ''}`
      ).join('\n');

      const system = `あなたは飲食現場スタッフ専用のAIコーチです。
現場で使えるやさしく短い回答をしてください。
登録レシピ:\n${recipeCtx}\n登録動画:\n${videoCtx}`;

      try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type':  'application/json',
            'x-api-key':     apiKey,
            'anthropic-version':            '2023-06-01',
            'anthropic-dangerous-allow-browser': 'true'
          },
          body: JSON.stringify({
            model:      'claude-sonnet-4-20250514',
            max_tokens: 800,
            system,
            messages: [...chatHistory.slice(-10), { role: 'user', content: userMessage }]
          })
        });
        if (!res.ok) {
          if (res.status === 401) return 'APIキーが無効です。';
          if (res.status === 429) return 'しばらく待ってから再試行してください。';
          return 'エラーが発生しました。';
        }
        const data = await res.json();
        return data.content[0].text;
      } catch (e) {
        return '接続できませんでした。ネットワークを確認してください。';
      }
    }

    /* ---- アニメーション ---- */
    function animateValue(element, target, duration=800) {
      let start = 0;
      const step = timestamp => {
        if (!start) start = timestamp;
        const progress = Math.min((timestamp - start) / duration, 1);
        const ease = 1 - Math.pow(1 - progress, 3);
        element.textContent = Math.floor(ease * target);
        if (progress < 1) requestAnimationFrame(step);
        else element.textContent = target;
      };
      requestAnimationFrame(step);
    }

    function goToNotif(id) {
      const n = NOTIFICATIONS.find(n => n.id === id);
      if (!n) return;
      const notifN = NOTIFICATIONS.find(x => x.id === id);
      if (notifN) notifN.read = true;

      if (currentUser && (currentUser.role === 'manager' || currentUser.role === 'headquarters')) {
        if (n.type === 'content_request')       managerNavigateTo('fbList');
        else if (n.type === 'video')            managerNavigateTo('videoMgmt');
        else if (n.type === 'recipe')           managerNavigateTo('recipeMgmt');
        else if (n.type === 'video_request')    managerNavigateTo('videoMgmt');
        else if (n.type === 'video_request_result') managerNavigateTo('dashboard');
        else if (n.type === 'task')             managerNavigateTo('taskMgmt');
        else if (n.type === 'manager_alert')    managerNavigateTo('dashboard');
        else managerNavigateTo('dashboard');

          navigateToTaskContent(n);

          currentPage = 'feed';

        <i class="fas ${icon}" style="font-size:48px;color:rgba(255,255,255,0.6)"></i>
        <span style="font-size:12px;color:rgba(255,255,255,0.5);font-weight:700;letter-spacing:2px;text-transform:uppercase">${video.category}</span>
      </div>`;
    }

    function readFileAsBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload  = e => resolve(e.target.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

      if (currentPage === 'feed')      renderFeed();
      else if (currentPage === 'videos')    renderManagerVideos();
      else if (currentPage === 'videoMgmt') renderVideoMgmt();
      else if (currentPage === 'dashboard' && currentUser && currentUser.role === 'manager') renderDashboard();
      // VIDEOS配列はグローバルに更新済みなので次回表示時は自動的に最新が反映される
    }

    function updateVideo(videoId, newData) {
      const idx = VIDEOS.findIndex(v => v.id === videoId);
      if (idx !== -1) VIDEOS[idx] = { ...VIDEOS[idx], ...newData };
    }

    function addVideo(newVideo) {
      newVideo.id = Math.max(...VIDEOS.map(v => v.id)) + 1;
      VIDEOS.push(newVideo);
    }

    /* ===================================================
       本部ダッシュボード
    =================================================== */
    function isTaskStuck(userId) {
      const tasks = TASKS.filter(t => t.assignedTo === userId
        && (t.status === 'unwatched' || t.status === 'watched'));
      return tasks.some(t => {
        const due = new Date(t.dueDate);
        const now = new Date();
        return (now - due) / (1000*60*60*24) >= 7;
      });
    }

    function getDaysElapsed(dateStr) {
      if (!dateStr) return 0;
      return Math.floor((new Date() - new Date(dateStr)) / (1000*60*60*24));
    }

    function getKpiTooltip(type) {
      if (type === 'totalStaff') {
        const counts = {};
        USERS.filter(u => u.role !== 'headquarters').forEach(u => {
          const pos = u.position || u.role;
          counts[pos] = (counts[pos] || 0) + 1;
        });
        return Object.entries(counts).map(([k,v]) => `${k}: ${v}名`).join(' / ');
      }
      if (type === 'avgMastery') {
        const stores = [...new Set(USERS.filter(u=>u.role==='staff').map(u=>u.store))];
        return stores.map(s => {
          const staff = USERS.filter(u=>u.store===s && u.role==='staff');
          const avg = staff.length ? Math.round(staff.reduce((a,b)=>a+(b.mastery||0),0)/staff.length) : 0;
          return `${s}: ${avg}%`;
        }).join(' / ');
      }
      return '';
    }

    function navigateToContent(type, contentId) {
      if (currentUser && (currentUser.role === 'headquarters' || currentUser.role === 'manager')) {
        if (type === 'video') managerNavigateTo('videoMgmt');
        else if (type === 'recipe') managerNavigateTo('recipeMgmt');
      } else {
        if (type === 'video') {
          feedTab = 'recommend'; feedCategory = null; feedSearch = '';
          currentPage = 'feed';
          renderStaffUI();
          setTimeout(() => {
            const idx = VIDEOS.findIndex(v => v.id === contentId);
            if (idx > 0) {
              const container = document.getElementById('feed-container');
              if (container) {
                const slides = container.querySelectorAll('.feed-slide');
                if (slides[idx]) slides[idx].scrollIntoView({ behavior: 'smooth' });
              }
            }
          }, 100);
        } else if (type === 'recipe') {
          currentPage = 'recipes';
          renderStaffUI();
          setTimeout(() => openRecipeModal(contentId), 100);
        }
      }
    }

    function notifyManager(staffId, staffName) {
      const u = USERS.find(u => u.id === staffId);
      const mgr = u ? USERS.find(m => m.role==='manager' && m.store===u.store) : null;
      if (!mgr) { showToast('担当店長が見つかりません'); return; }
      NOTIFICATIONS.push({
        id: Date.now() + Math.random(),
        type: 'manager_alert',
        userId: mgr.id,
        message: `${staffName}のフォローが必要です`,
        createdAt: new Date().toISOString().split('T')[0],
        read: false,
      });
      showToast(`${mgr.name}に通知を送りました`);
    }

          <span style="width:24px;text-align:center;display:inline-flex;align-items:center;justify-content:center">${MEDALS[i]}</span>

              <span style="font-size:12px;color:var(--text-muted)"><i class="fa-solid fa-heart" style="color:#e74c3c"></i>${v.likes||0} <i class="fa-solid fa-bookmark" style="color:var(--primary)"></i>${v.saves||0}</span>
            </div>
            <div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden">
              <div class="progress-bar-fill" style="--target-width:${Math.round(v.score/maxScore*100)}%;background:var(--primary)"></div>
            </div>

      // 📋 改善リクエスト（旧：未対応FB）
      const reqCards = FEEDBACKS
        .filter(f => f.type==='content_request' && f.status==='未対応')
        .slice(0,3)
        .map(f => `
          <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
            <i class="fa-solid fa-envelope" style="color:var(--primary)"></i>
            <div style="flex:1;font-size:13px">${f.store||''}からリクエストが届いています</div>
            <button class="btn-primary-sm" style="font-size:11px;padding:5px 10px"
              onclick="managerNavigateTo('fbList')">リクエスト管理へ</button>
          </div>`).join('') ||
        '<p style="font-size:13px;color:var(--text-muted);padding:8px 0">未対応のリクエストはありません</p>';

      content.innerHTML = `
        <div class="hq-dashboard">
          <div class="kpi-grid">${kpiCards}</div>

          <div class="hq-chart-card">
            ${rankHtml}
            <p style="font-size:12px;color:var(--text-muted);margin-top:12px">人気コンテンツを参考に、より多く見られる動画を追加しましょう</p>

            </div>

          </div>`;
      }).join('');

      // 投稿申請一覧（HQのみ）
      const pendingReviewHtml = PENDING_VIDEOS.filter(p => p.status === 'pending').map(p => `
        <div class="mgmt-card" style="margin-bottom:8px">
          <div class="mgmt-card-thumb" style="position:relative;overflow:hidden">
            ${renderVideoThumbnail(p)}
          </div>
          <div class="mgmt-card-info">
            <div class="mgmt-card-title">${p.title}</div>
            <div class="mgmt-card-meta">${p.category} · ${p.store} · ${p.submittedBy} · ${p.submittedAt}</div>
          </div>
          <div class="mgmt-card-actions" style="gap:6px;flex-direction:column;align-items:stretch">

          </div>
        </div>`).join('') || '';

      const pendingSection = pendingReviewHtml ? `
        <div style="background:var(--warning-light);border:1px solid var(--warning);border-radius:var(--radius-md);padding:16px;margin-bottom:20px">
          <div style="font-size:14px;font-weight:700;color:var(--warning);margin-bottom:12px"><i class="fa-solid fa-inbox" style="margin-right:6px"></i>投稿申請一覧</div>
          ${pendingReviewHtml}
        </div>` : '';

      content.innerHTML = `
        <div class="mgmt-page">
          ${pendingSection}
          <div class="mgmt-toolbar">
            <button class="btn-primary-sm" onclick="openVideoEdit(null,'')">
              <i class="fa-solid fa-plus"></i> 新規動画追加
            </button>
          </div>
          ${foldersHtml}
        </div>
        <div id="video-edit-overlay" style="display:none"></div>`;
    }

    function toggleVideoFolder(cat) {
      openVideoFolders.has(cat) ? openVideoFolders.delete(cat) : openVideoFolders.add(cat);
      renderVideoMgmt();
    }

    function toggleVideoPublish(id) {
      const v = VIDEOS.find(v => v.id === id);
      if (v) v.published = !v.published;
      renderVideoMgmt();
      renderAllVideoViews();
    }

    function approveVideoRequest(pendingId) {
      const p = PENDING_VIDEOS.find(x => x.id === pendingId);
      if (!p) return;
      p.status = 'approved';
      const newId = Math.max(0, ...VIDEOS.map(v => v.id)) + 1;
      VIDEOS.push({
        id:          newId,
        title:       p.title,
        category:    p.category,
        description: p.description,
        thumbnail:   p.thumbnail,
        videoData:   p.videoData,
        store:       p.store,
        published:   true,
        views:       0,
        likes:       0,
        saves:       0,
        subtitles:   { ja:'', en:'', vi:'', my:'', ne:'' },
        duration:    p.duration || '--',
      });
      // 店長へ通知
      const mgr = USERS.find(u => u.role==='manager' && u.store===p.store);
      if (mgr) NOTIFICATIONS.push({
        id: Date.now(), type:'video_request_result', userId: mgr.id,
        message:`「${p.title}」が承認されて公開されました`,
        createdAt: new Date().toISOString().slice(0,10), read:false,
      });
      renderVideoMgmt(); renderAllVideoViews();
      showToast(`「${p.title}」を承認して公開しました ✅`);
    }

    function rejectVideoRequest(pendingId) {
      const p = PENDING_VIDEOS.find(x => x.id === pendingId);
      if (!p) return;
      p.status = 'rejected';
      const mgr = USERS.find(u => u.role==='manager' && u.store===p.store);
      if (mgr) NOTIFICATIONS.push({
        id: Date.now(), type:'video_request_result', userId: mgr.id,
        message:`「${p.title}」の申請が差し戻されました`,
        createdAt: new Date().toISOString().slice(0,10), read:false,
      });
      renderVideoMgmt();
      showToast(`「${p.title}」を差し戻しました`);
    }

    function openVideoRequestReview(pendingId) {
      const pending = PENDING_VIDEOS.find(v => v.id === pendingId);
      if (!pending) {
        console.error('申請が見つかりません:', pendingId);
        return;
      }

      console.log('申請データ確認:', {
        title:       pending.title,
        hasThumb:    !!pending.thumbnail,
        hasVideo:    !!pending.videoData,
        videoLength: pending.videoData ? pending.videoData.length : 0,
      });

      // モーダル構造を先に構築（base64データは後からDOMに代入）
      const overlay = document.getElementById('video-edit-overlay');
      overlay.style.display = 'flex';
      overlay.innerHTML = `
        <div class="modal-sheet wide-modal" id="video-review-modal">
          <div class="modal-header">
            <span><i class="fa-solid fa-inbox" style="margin-right:8px;color:var(--warning)"></i>投稿申請の確認</span>
            <i class="fa-solid fa-xmark" onclick="closeVideoEdit()" style="cursor:pointer;font-size:18px"></i>
          </div>
          <div class="modal-body">
            <div id="review-media-area" style="border-radius:var(--radius-md);overflow:hidden;margin-bottom:16px"></div>
            <div class="review-title" style="font-size:16px;font-weight:700;margin-bottom:4px"></div>
            <div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">
              <span class="review-category"></span>・<span class="review-store"></span>・申請者: <span class="review-submitter"></span>・<span class="review-date"></span>
            </div>
            <div class="review-description" style="font-size:13px;color:var(--text-primary);background:var(--bg);border-radius:var(--radius-sm);padding:10px;margin-bottom:16px;display:none"></div>
            <label class="form-label">コメント（任意）</label>
            <textarea class="form-input review-comment" rows="2" placeholder="差し戻し理由など"></textarea>
          </div>
          <div class="modal-footer">
            <button class="btn-secondary btn-reject">
              <i class="fa-solid fa-rotate-left" style="margin-right:4px"></i>差し戻し
            </button>
            <button class="btn-primary btn-approve">
              <i class="fa-solid fa-check" style="margin-right:4px"></i>承認して公開
            </button>
          </div>
        </div>`;

      // メディアエリアをDOMに直接代入（テンプレートリテラルに大きなbase64を埋め込まない）
      const mediaArea = document.getElementById('review-media-area');
      if (pending.videoData
          && typeof pending.videoData === 'string'
          && pending.videoData.startsWith('data:video')) {

        const vid = document.createElement('video');
        vid.controls   = true;
        vid.playsInline = true;
        vid.style.cssText = 'width:100%;max-height:360px;object-fit:contain;background:#000;border-radius:8px;display:block;';
        vid.setAttribute('src', pending.videoData);
        mediaArea.innerHTML = '';
        mediaArea.appendChild(vid);
        vid.load();

      } else if (pending.thumbnail
                 && typeof pending.thumbnail === 'string'
                 && pending.thumbnail.startsWith('data:')) {

        const wrapper = document.createElement('div');
        wrapper.style.cssText = 'position:relative;';
        const img = document.createElement('img');
        img.src = pending.thumbnail;
        img.style.cssText = 'width:100%;max-height:360px;object-fit:contain;border-radius:8px;display:block;';
        const badge = document.createElement('div');
        badge.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.6);color:white;padding:8px 16px;border-radius:6px;font-size:12px;';
        badge.textContent = '動画ファイルなし（サムネイルのみ）';
        wrapper.appendChild(img);
        wrapper.appendChild(badge);
        mediaArea.innerHTML = '';
        mediaArea.appendChild(wrapper);

      } else {
        mediaArea.innerHTML = '<div style="height:200px;background:#F3F4F6;display:flex;align-items:center;justify-content:center;border-radius:8px;color:#9CA3AF;font-size:14px;"><i class="fas fa-video" style="margin-right:8px;"></i>メディアなし</div>';
      }

      // テキスト情報をDOMに設定（モーダル内に限定してクエリ）
      const modal = document.getElementById('video-review-modal');
      const setEl = (selector, value) => {
        const el = modal.querySelector(selector);
        if (el) el.textContent = value || '未設定';
      };
      setEl('.review-title',     pending.title);
      setEl('.review-category',  pending.category);
      setEl('.review-store',     pending.store);
      setEl('.review-submitter', pending.submittedBy);
      setEl('.review-date',      pending.submittedAt);
      if (pending.description) {
        const descEl = modal.querySelector('.review-description');
        if (descEl) { descEl.textContent = pending.description; descEl.style.display = ''; }
      }

      // ボタンのイベントをJS側で設定（モーダル内に限定してクエリ）
      const approveBtn = modal.querySelector('.btn-approve');
      const rejectBtn  = modal.querySelector('.btn-reject');
      if (approveBtn) approveBtn.onclick = () => { approveVideoRequest(pendingId); closeVideoEdit(); };
      if (rejectBtn)  rejectBtn.onclick  = () => { rejectVideoRequest(pendingId);  closeVideoEdit(); };
    }

    function previewThumb(input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        videoEditData.thumbnail   = e.target.result;
        videoEditData.thumbBase64 = e.target.result;
        // プレビュー更新
        const prev = document.getElementById('thumb-preview');
        if (prev) { prev.src = e.target.result; prev.style.display = 'block'; }
      };
      reader.readAsDataURL(file);
    }

    function previewVideoFile(input) {
      const file = input.files[0];
      if (!file) return;
      const url = URL.createObjectURL(file);
      const tmp = document.createElement('video');
      tmp.preload = 'metadata';
      tmp.onloadedmetadata = () => {
        URL.revokeObjectURL(url);
        if (tmp.duration > 300) {
          showToast('動画は5分以内にしてください');
          input.value = '';
          return;
        }
        const reader = new FileReader();
        reader.onload = e => {
          videoEditData.videoData   = e.target.result;
          videoEditData.videoBase64 = e.target.result;
          const mins = Math.floor(tmp.duration / 60);
          const secs = Math.floor(tmp.duration % 60);
          videoEditData.duration = `${mins}:${String(secs).padStart(2,'0')}`;
          // プレビュー更新
          const prev = document.getElementById('video-preview');
          if (prev) { prev.src = e.target.result; prev.style.display = 'block'; }
        };
        reader.readAsDataURL(file);
      };
      tmp.src = url;
    }

      if (id) {
        const idx = VIDEOS.findIndex(v => v.id === id);

          ...VIDEOS[idx],
          title:       videoEditData.title,
          category:    videoEditData.category,
          store:       videoEditData.store,
          duration:    videoEditData.duration,
          description: videoEditData.description,
          thumbnail:   videoEditData.thumbnail   || VIDEOS[idx].thumbnail,
          videoData:   videoEditData.videoData   || VIDEOS[idx].videoData,
          subtitles:   videoEditData.subtitles   || VIDEOS[idx].subtitles || {},
          published:   videoEditData.published   ?? VIDEOS[idx].published,

      } else {

    function openRecipeEdit(id, defaultStore) {
      const r = id ? RECIPES.find(r => r.id === id) : null;
      // 多言語フィールドを正規化（jaを優先して文字列として扱う）
      const getName  = v => typeof v === 'object' ? (v.ja || '') : (v || '');
      const getArr   = v => {
        const s = typeof v === 'object' ? (v.ja || '') : (v || '');
        return Array.isArray(s) ? s : (s ? s.split('\n') : []);
      };
      const getIng   = v => {
        if (!v) return [];
        const s = typeof v === 'object' ? (v.ja || '') : v;
        return Array.isArray(s) ? s : s.split(/[,、]/).map(x => x.trim()).filter(Boolean);
      };
      recipeEditData = r ? {...r} : {
        id: Date.now(), name:'', store: defaultStore||'', category:'',
        difficulty:3, cost:0, steps:[], ingredients:[],
      };
      const recName  = r ? getName(r.title || r.name) : '';
      const recCat   = r ? getName(r.category) : '';
      const recIng   = r ? getIng(r.ingredients).join(', ') : '';
      const recSteps = r ? getArr(r.steps).join('\n') : '';
      const recNotes = r ? getName(r.notes) : '';
      const storeOpts = hqStoreList.map(s => `<option ${(recipeEditData.store||defaultStore)===s?'selected':''}>${s}</option>`).join('');
      const typeOpts  = ['仕込み','作り方','提供'].map(t => `<option ${(r?.type||'仕込み')===t?'selected':''}>${t}</option>`).join('');

      if (!overlay) return;
      overlay.style.display = 'flex';
      overlay.innerHTML = `
        <div class="modal-sheet wide-modal">
          <div class="modal-header">
            <span>${id ? 'レシピ編集' : 'レシピを追加'}</span>
            <i class="fa-solid fa-xmark" onclick="closeRecipeEdit()" style="cursor:pointer;font-size:18px"></i>

            <label class="form-label">店舗</label>
            <select class="form-input" id="re-store">${storeOpts}</select>
            <label class="form-label">種別</label>
            <select class="form-input" id="re-type">${typeOpts}</select>

    function saveRecipeEdit(id) {
      const titleVal = document.getElementById('re-name').value.trim();
      if (!titleVal) { showToast('タイトルを入力してください'); return; }
      const catVal  = document.getElementById('re-cat').value.trim();
      const updated = {
        name:        titleVal,
        title:       titleVal,
        store:       document.getElementById('re-store').value,
        category:    catVal,
        type:        document.getElementById('re-type').value,
        difficulty:  parseInt(document.getElementById('re-diff').value)||3,
        cost:        parseInt(document.getElementById('re-cost').value)||0,
        ingredients: document.getElementById('re-ing').value.split(/[,、]/).map(s=>s.trim()).filter(Boolean),
        steps:       document.getElementById('re-steps').value.split('\n').map(s=>s.trim()).filter(Boolean),
        notes:       document.getElementById('re-notes').value.trim(),
      };
      if (id) {
        const idx = RECIPES.findIndex(r => r.id === id);
        if (idx >= 0) RECIPES[idx] = {...RECIPES[idx], ...updated};
      } else {
        updated.id = Math.max(0, ...RECIPES.map(r => r.id)) + 1;
        RECIPES.push(updated);
      }
      closeRecipeEdit();
      renderRecipeMgmt();
      showToast('保存しました');
    }

    function closeRecipeEdit() {
      const el = document.getElementById('recipe-edit-overlay');
      if (el) el.style.display = 'none';
    }

        <div id="fb-detail-overlay" style="display:none"></div>`;

    function updateFbStatus(id, status) {
      const f = FEEDBACKS.find(f => f.id === id);
      if (f) f.status = status;
      renderFbList();
      showToast('ステータスを更新しました');
    }

    function openFbDetail(id) {
      const f = FEEDBACKS.find(f => f.id === id);
      if (!f) return;
      const overlay = document.getElementById('fb-detail-overlay');
      if (!overlay) return;
      overlay.style.display = 'flex';
      overlay.innerHTML = `
        <div class="modal-sheet wide-modal">
          <div class="modal-header">
            <span>FB詳細</span>
            <i class="fa-solid fa-xmark" onclick="closeFbDetail()" style="cursor:pointer;font-size:18px"></i>
          </div>
          <div class="modal-body">
            <div class="fb-detail-row"><label>店舗</label><span>${f.store||'-'}</span></div>
            <div class="fb-detail-row"><label>ジャンル</label><span>${f.genre||'-'}</span></div>
            <div class="fb-detail-row"><label>詳細</label><span>${f.detail||'-'}</span></div>
            <div class="fb-detail-row"><label>ステータス</label><span>${f.status||'-'}</span></div>
            <div class="fb-detail-row"><label>期限</label><span>${f.deadline||'-'}</span></div>
            ${f.note ? `<div class="fb-detail-row"><label>備考</label><span>${f.note}</span></div>` : ''}
            ${f.imageBase64 ? `<img src="${f.imageBase64}" style="max-width:100%;border-radius:8px;margin-top:8px">` : ''}
          </div>
        </div>`;
    }

    function closeFbDetail() {
      const el = document.getElementById('fb-detail-overlay');
      if (el) el.style.display = 'none';
    }

    /* ===================================================
       システム設定
    =================================================== */
    let settingsSkillmapStore = Object.keys(STORE_SKILL_CATEGORIES)[0] || '';

    function renderSettings() {
      const content = document.getElementById('main-content');

      // スキルマップ編集：店舗別カテゴリ
      const storeKeys = Object.keys(STORE_SKILL_CATEGORIES);
      const curStore  = settingsSkillmapStore || storeKeys[0] || '';
      const storeCats = STORE_SKILL_CATEGORIES[curStore] || [];
      const storeSelectOpts = storeKeys.map(s => `<option value="${s}" ${curStore===s?'selected':''}>${s}</option>`).join('');
      const catRowsHtml = storeCats.map((cat, i) => `
        <div class="settings-row">
          <span class="settings-label">${cat.name}</span>
          <div class="settings-actions">
            <button class="icon-btn" onclick="moveStoreCat('${curStore}',${i},-1)" ${i===0?'disabled':''}><i class="fa-solid fa-arrow-up"></i></button>
            <button class="icon-btn" onclick="moveStoreCat('${curStore}',${i},1)" ${i===storeCats.length-1?'disabled':''}><i class="fa-solid fa-arrow-down"></i></button>
            <button class="icon-btn danger" onclick="deleteStoreCat('${curStore}',${cat.id})"><i class="fa-solid fa-trash"></i></button>
          </div>
        </div>`).join('') || '<p style="font-size:13px;color:var(--text-secondary)">カテゴリなし</p>';

      const customFieldsHtml = hqCustomFields.map((f, i) => `
        <div class="settings-row">
          <span class="settings-label">${f.label} (${f.type})</span>
          <button class="icon-btn danger" onclick="hqCustomFields.splice(${i},1);renderSettings()"><i class="fa-solid fa-trash"></i></button>
        </div>`).join('') || '<p style="font-size:13px;color:var(--text-secondary)">カスタムフィールドなし</p>';

      const storeRowsHtml = hqStoreList.map((s, i) => `
        <div class="settings-row">
          <span class="settings-label">${s}</span>
          <button class="icon-btn danger" onclick="hqStoreList.splice(${i},1);renderSettings()"><i class="fa-solid fa-trash"></i></button>
        </div>`).join('');

      const posRowsHtml = hqPositionList.map((p, i) => `
        <div class="settings-row">
          <span class="settings-label">${p}</span>
          <button class="icon-btn danger" onclick="hqPositionList.splice(${i},1);renderSettings()"><i class="fa-solid fa-trash"></i></button>
        </div>`).join('');

      content.innerHTML = `
        <div class="mgmt-page settings-page">

          <div class="settings-section">
            <div class="settings-section-heading"><i class="fa-solid fa-table-cells" style="color:var(--primary);margin-right:6px"></i>スキルマップ編集</div>
            <div class="settings-section-sub">スキルマップの縦軸（評価項目）を店舗ごとに編集します</div>
            <select class="form-input" style="max-width:200px;margin-bottom:16px"
              onchange="settingsSkillmapStore=this.value;renderSettings()">
              ${storeSelectOpts}
            </select>
            ${catRowsHtml}
            <div style="display:flex;gap:8px;margin-top:12px">
              <input class="form-input" id="new-cat-input" placeholder="新しいカテゴリ名">
              <button class="btn-primary-sm" onclick="addStoreCat('${curStore}')"><i class="fa-solid fa-plus"></i> 追加</button>
            </div>
          </div>

          <div class="settings-section">
            <div class="settings-section-heading"><i class="fa-solid fa-pen-to-square" style="color:var(--primary);margin-right:6px"></i>従業員管理編集</div>
            <div class="settings-section-sub">店長が従業員を登録する際の入力項目を編集します</div>
            ${customFieldsHtml}
            <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
              <input class="form-input" id="new-field-label" placeholder="フィールド名" style="flex:1;min-width:120px">
              <select class="form-input" id="new-field-type" style="max-width:120px">
                <option>text</option><option>number</option><option>date</option><option>select</option>
              </select>
              <button class="btn-primary-sm" onclick="addCustomField()"><i class="fa-solid fa-plus"></i> 追加</button>
            </div>
          </div>

          <div class="settings-section">
            <div class="settings-section-heading"><i class="fa-solid fa-gear" style="color:var(--primary);margin-right:6px"></i>マスターデータ編集</div>
            <div class="settings-section-sub">店舗名・役職名などのプルダウン選択肢を編集します</div>
            <div style="font-size:12px;font-weight:700;color:var(--text-secondary);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em">店舗リスト</div>
            ${storeRowsHtml}
            <div style="display:flex;gap:8px;margin-top:12px;margin-bottom:20px">
              <input class="form-input" id="new-store-input" placeholder="店舗名">
              <button class="btn-primary-sm" onclick="addStore()"><i class="fa-solid fa-plus"></i> 追加</button>
            </div>
            <div style="font-size:12px;font-weight:700;color:var(--text-secondary);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em">役職リスト</div>
            ${posRowsHtml}
            <div style="display:flex;gap:8px;margin-top:12px">
              <input class="form-input" id="new-pos-input" placeholder="役職名">
              <button class="btn-primary-sm" onclick="addPosition()"><i class="fa-solid fa-plus"></i> 追加</button>
            </div>
          </div>

        </div>`;
    }

    function moveStoreCat(store, index, dir) {
      const cats = STORE_SKILL_CATEGORIES[store];
      if (!cats) return;
      const i2 = index + dir;
      if (i2 < 0 || i2 >= cats.length) return;
      [cats[index], cats[i2]] = [cats[i2], cats[index]];
      renderSettings();
    }

    function deleteStoreCat(store, catId) {
      const cats = STORE_SKILL_CATEGORIES[store];
      if (!cats) return;
      const idx = cats.findIndex(c => c.id === catId);
      if (idx >= 0) cats.splice(idx, 1);
      renderSettings();
    }

    function addStoreCat(store) {
      const val = document.getElementById('new-cat-input').value.trim();
      if (!val) return;
      if (!STORE_SKILL_CATEGORIES[store]) STORE_SKILL_CATEGORIES[store] = [];
      const cats = STORE_SKILL_CATEGORIES[store];
      const newId = Math.max(0, ...cats.map(c => c.id)) + 1;
      cats.push({ id: newId, name: val });
      renderSettings();
      showToast('カテゴリを追加しました');
    }

    function addCustomField() {
      const label = document.getElementById('new-field-label').value.trim();
      const type  = document.getElementById('new-field-type').value;
      if (!label) return;
      hqCustomFields.push({ label, type });
      renderSettings();
      showToast('フィールドを追加しました');
    }

    function addStore() {
      const val = document.getElementById('new-store-input').value.trim();
      if (!val) return;
      hqStoreList.push(val);
      renderSettings();
      showToast('店舗を追加しました');
    }

    function addPosition() {
      const val = document.getElementById('new-pos-input').value.trim();
      if (!val) return;
      hqPositionList.push(val);
      renderSettings();
      showToast('役職を追加しました');
    }

    function logout() {
      currentUser = null;
      chatHistory = [];
      currentPage = 'feed';
      document.getElementById('app-screen').classList.remove('pc-layout');
      document.getElementById('sidebar').innerHTML = '';
      document.getElementById('bottom-tab').innerHTML = '';
      document.getElementById('app-screen').style.display = 'none';
      document.getElementById('login-screen').style.display = 'flex';
    }
  </script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, serverTimestamp, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAgd3NUGdTIosjPQ5Qu2bljEfcTK2T0g8E",
  authDomain: "skillreel-68091.firebaseapp.com",
  projectId: "skillreel-68091",
  storageBucket: "skillreel-68091.firebasestorage.app",
  messagingSenderId: "659149705828",
  appId: "1:659149705828:web:ffcaaf1b62e3c4f0b14571"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

window.updateSkill = async function (skillId, value) {
  const firebaseUser = auth.currentUser;

  if (!firebaseUser) {
    alert("ログインしてください");
    return;
  }

  try {
    await setDoc(doc(db, "users", firebaseUser.uid), {
      skillChecks: {
        [skillId]: value
      },
      lastUpdatedAt: serverTimestamp()
    }, { merge: true });

    if (!currentUser) currentUser = {};
    if (!currentUser.skillChecks) currentUser.skillChecks = {};

    currentUser.skillChecks[skillId] = value;
    renderSkills();

    console.log("スキル保存成功:", skillId, value);
  } catch (error) {
    console.error("スキル保存エラー:", error);
    alert("保存に失敗しました: " + error.message);
  }
};
  // ページ読み込み時のセッション復元（既にログイン済みの場合のみ）
  onAuthStateChanged(auth, async (firebaseUser) => {
    if (!firebaseUser) return;
    // クリックハンドラ側で既にログイン処理済みの場合はスキップ
    if (document.getElementById('login-screen').style.display === 'none') return;

    try {
      const userRef = doc(db, "users", firebaseUser.uid);
      const userSnap = await getDoc(userRef);
      if (userSnap.exists()) {
        const userData = userSnap.data();
        login(userData.role || "staff", firebaseUser, userData);
      } else {
        login("staff", firebaseUser, null);
      }
    } catch (error) {
      console.error("ユーザー復元エラー:", error);
      login("staff", firebaseUser, null);
    }
  });

  document.getElementById("googleLoginBtn").addEventListener("click", async () => {
    try {
      const result = await signInWithPopup(auth, provider);
      const firebaseUser = result.user;

      // Firestoreからユーザーデータ取得
      let userData = null;
      try {
        const userRef = doc(db, "users", firebaseUser.uid);
        const userSnap = await getDoc(userRef);
        if (userSnap.exists()) {
          userData = userSnap.data();
          // ログイン日時を更新
          await setDoc(userRef, { lastLoginAt: serverTimestamp() }, { merge: true });
        } else {
          // 初回登録
          const newUserData = {
            uid: firebaseUser.uid,
            name: firebaseUser.displayName || "未設定",
            email: firebaseUser.email || "",
            photoURL: firebaseUser.photoURL || "",
            role: "staff",
            companyId: "company_001",
            storeId: "store_001",
            createdAt: serverTimestamp(),
            lastLoginAt: serverTimestamp()
          };
          await setDoc(userRef, newUserData, { merge: true });
          userData = newUserData;
        }
      } catch (fsError) {
        // Firestoreエラーはログのみ（ログインは続行）
        console.warn("Firestore操作エラー（続行）:", fsError);
      }

      // 直接login()を呼んで画面遷移
      login(userData?.role || "staff", firebaseUser, userData);

    } catch (error) {
      console.error("Googleログインエラー:", error);
      alert("Googleログインに失敗しました: " + error.message);
    }
  });
  window.logout = async function () {
  try {
    await signOut(auth);
    location.reload();
  } catch (error) {
    console.error("ログアウトエラー:", error);
    alert("ログアウトに失敗しました");
  }
};
</script>
