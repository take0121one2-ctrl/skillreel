function toggleFeedDetail(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const isVisible = el.style.transform === 'translateY(0%)';
  document.querySelectorAll('[id^="detail-"]').forEach(d => {
    d.style.transform = 'translateY(100%)';
  });
  if (!isVisible) el.style.transform = 'translateY(0%)';
}

function filterFeedVideos() {
  const search = document.getElementById('feed-search')?.value?.toLowerCase() || '';
  const filtered = allFeedVideos.filter(v => {
    const matchSearch = !search ||
      v.title?.toLowerCase().includes(search) ||
      v.description?.toLowerCase().includes(search) ||
      v.uploaderName?.toLowerCase().includes(search);
    const matchGenre = !currentGenreFilter || v.genre === currentGenreFilter;
    return matchSearch && matchGenre;
  });
  renderFeedSlides(filtered);
}

function filterGenre(genre) {
  currentGenreFilter = genre;
  document.getElementById('genre-all').style.background =
    genre === '' ? 'white' : 'rgba(255,255,255,0.2)';
  document.getElementById('genre-all').style.color =
    genre === '' ? 'var(--text-primary)' : 'white';
  GENRES.forEach(g => {
    const btn = document.getElementById('genre-' + g);
    if (btn) {
      btn.style.background = g === genre ? 'white' : 'rgba(255,255,255,0.2)';
      btn.style.color = g === genre ? 'var(--text-primary)' : 'white';
    }
  });
  filterFeedVideos();
}

function switchChannel(channelId) {
  currentChannel = channelId;
  const content = document.getElementById('main-content');
  if (content && currentPage === 'feed') renderFeed(content);
}

function toggleCaption(videoId) {
  const slide = document.getElementById('slide-' + videoId);
  if (!slide) return;
  const iframe = slide.querySelector('iframe');
  if (!iframe) {
    showToast('この動画には字幕が利用できません');
    return;
  }

  const src = iframe.src;
  const btn = document.getElementById('caption-btn-' + videoId);
  const ccLang = (() => {
    const map = { ja:'ja', en:'en', vi:'vi', my:'my', ne:'ne' };
    return map[currentLang] || 'ja';
  })();

  if (src.includes('cc_load_policy=1')) {
    iframe.src = src.replace('cc_load_policy=1', 'cc_load_policy=0');
    if (btn) btn.style.background = 'rgba(255,255,255,0.2)';
    showToast('字幕をオフにしました');
  } else {
    const newSrc = src.includes('cc_load_policy=0')
      ? src.replace('cc_load_policy=0', 'cc_load_policy=1')
      : src + '&cc_load_policy=1&cc_lang_pref=' + ccLang;
    iframe.src = newSrc;
    if (btn) btn.style.background = 'rgba(37,99,235,0.6)';
    showToast('字幕をオンにしました');
  }
}

async function likeVideo(videoId, btn) {
  const uid = currentUser?.uid || '';
  if (!uid) { showToast('ログインが必要です', 'error'); return; }

  // 重複チェック
  try {
    if (window._getDocs && window._query) {
      const dupQ = window._query(
        window._collection(window._db, 'userLikes'),
        window._where('userId', '==', uid),
        window._where('videoId', '==', videoId)
      );
      const dupSnap = await window._getDocs(dupQ);
      if (dupSnap.size > 0) {
        showToast((LANG_TEXTS[currentLang]||LANG_TEXTS['ja']).alreadyLiked);
        return;
      }
    }
  } catch(e) {}

  // 即時UI更新
  const countEl = btn?.querySelector('span');
  const iconEl = btn?.querySelector('i');
  if (countEl) countEl.textContent = parseInt(countEl.textContent || 0) + 1;
  if (iconEl) iconEl.style.color = '#FF3B5C';
  if (btn) btn.style.background = 'rgba(255,59,92,0.35)';
  if (btn) btn.style.pointerEvents = 'none';

  if (btn) {
    btn.style.transform = 'scale(1.3)';
    setTimeout(() => { btn.style.transform = 'scale(1)'; }, 200);
    btn.style.transition = 'transform 0.2s ease';
  }

  showToast((LANG_TEXTS[currentLang]||LANG_TEXTS['ja']).likeToast);

  try {
    const companyId = currentUser?.companyId || 'company_001';
    if (window._addDoc && window._collection) {
      await window._addDoc(
        window._collection(window._db, 'userLikes'), {
          userId: uid,
          videoId,
          companyId,
          createdAt: window._serverTimestamp()
        }
      );
    }
    if (window._updateDoc && window._doc && window._increment) {
      await window._updateDoc(
        window._doc(window._db, 'videos', videoId),
        { likes: window._increment(1) }
      );
    }
  } catch(e) {}
}

async function handleMarkWatched(videoId, taskId, btn) {
  const uid = currentUser?.uid || '';
  if (!uid) { showToast('ログインが必要です', 'error'); return; }

  // 即時UI変化
  if (btn) {
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 記録中...';
    btn.style.pointerEvents = 'none';
  }

  await markWatched(videoId, taskId);

  if (btn) {
    btn.innerHTML = '<i class="fa-solid fa-check-double"></i> 視聴済み ✅';
    btn.style.background = 'rgba(255,255,255,0.2)';
    btn.style.border = '2px solid rgba(255,255,255,0.5)';
    btn.style.color = 'white';
    btn.style.pointerEvents = 'none';
    btn.style.transform = 'scale(1.05)';
    setTimeout(() => { if (btn) btn.style.transform = 'scale(1)'; }, 200);
    btn.style.transition = 'all 0.3s ease';
  }
}

async function markWatched(videoId, taskId) {
  const uid = currentUser?.uid || '';
  if (!uid) return;
  const companyId = currentUser?.companyId || 'company_001';
  const storeId = currentUser?.storeId || '';

  try {
    // views数をインクリメント
    if (videoId && !videoId.startsWith('d') && window._updateDoc && window._increment) {
      try {
        await window._updateDoc(
          window._doc(window._db, 'videos', videoId),
          { views: window._increment(1) }
        );
      } catch(e) {}
    }

    // watchHistoryに記録
    if (window._addDoc && window._collection) {
      await window._addDoc(
        window._collection(window._db, 'watchHistory'), {
          videoId,
          userId: uid,
          companyId,
          storeId,
          watchedAt: window._serverTimestamp()
        }
      );
    }

    // taskIdが直接渡された場合はそれを使う
    if (taskId && window._updateDoc && window._doc) {
      try {
        await window._updateDoc(
          window._doc(window._db, 'taskAssignments', taskId),
          { status: 'watched', watchedAt: window._serverTimestamp() }
        );
      } catch(e) {}
    } else {
      // taskIdがない場合は既存のクエリで検索
      if (uid && window._getDocs && window._query) {
        try {
          const q = window._query(
            window._collection(window._db, 'taskAssignments'),
            window._where('assignedTo', '==', uid),
            window._where('videoId', '==', videoId),
            window._where('status', '==', 'unwatched')
          );
          const snap = await window._getDocs(q);
          for (const d of snap.docs) {
            await window._updateDoc(
              window._doc(window._db, 'taskAssignments', d.id),
              { status: 'watched', watchedAt: window._serverTimestamp() }
            );
          }
        } catch(e) {}
      }
    }

    showToast('視聴済みにしました ✅');

    // タスク画面が表示中なら更新
    if (currentPage === 'tasks') {
      const content = document.getElementById('main-content');
      if (content) await renderTasks(content);
    }

  } catch(e) {
    showToast('視聴済みにしました ✅');
  }
}

      <div style="padding:16px;border-bottom:1px solid var(--border);
        display:flex;justify-content:space-between;align-items:center;">
        <div style="font-size:16px;font-weight:700;">${(LANG_TEXTS[currentLang]||LANG_TEXTS['ja']).notifTitle}</div>
        <button onclick="closeNotificationDrawer()" style="
          background:none;border:none;cursor:pointer;font-size:20px;
          color:var(--text-muted);">
          <i class="fa-solid fa-times"></i>
        </button>
      </div>

  const drawer = document.getElementById('notification-drawer');
  const overlay = document.getElementById('notification-overlay');
  if (drawer) drawer.style.right = '-320px';
  if (overlay) overlay.style.display = 'none';
}

function handleNotificationTap(type, videoId, videoChannel) {
  closeNotificationDrawer();

  const role = currentUser?.role || 'staff';

  if (type === 'new_task') {
    if (role === 'staff') navigateStaff('tasks');
    return;
  }

  if (type === 'video_request') {
    if (role === 'headquarters') navigateHQ('videos');
    if (role === 'manager') navigateManager('upload');
    return;
  }

  // new_video・video_updated：該当動画に飛ぶ
  if (type === 'new_video' || type === 'video_updated') {
    if (role === 'staff') {
      // チャンネルを切り替え
      if (videoChannel === 'store') {
        currentChannel = 'store';
      } else if (videoChannel === 'pr') {
        currentChannel = 'pr';
      } else {
        currentChannel = 'common';
      }
      // videoIdがある場合はその動画に飛ぶ
      if (videoId) {
        window._pendingTaskVideoId = videoId;
        window._scrollToVideoId = videoId;
      }
      navigateStaff('feed');

    } else if (role === 'manager') {
      if (videoChannel === 'store') {
        navigateManager('storestock');
      } else {
        navigateManager('upload');
      }
    } else if (role === 'headquarters') {
      navigateHQ('videos');
    }
  }
}

async function loadNotifications() {
  const listEl = document.getElementById('notification-list');
  if (!listEl) return;

  const uid = currentUser?.uid || '';
  const role = currentUser?.role || 'staff';
  const storeId = currentUser?.storeId || '';
  const companyId = currentUser?.companyId || 'company_001';

  let notifications = [];
  try {
    if (window._getDocs && window._query) {
      const q = window._query(
        window._collection(window._db, 'notifications'),
        window._where('companyId', '==', companyId)
      );
      const snap = await window._getDocs(q);
      snap.forEach(d => {
        const data = { id: d.id, ...d.data() };

        // フィルタリング条件
        const isPersonal = data.targetUserId === uid;
        const isStoreMatch = data.targetStoreId === storeId;
        const isAllStore = !data.targetStoreId || data.targetStoreId === null;
        const isRoleMatch = data.targetRole === 'all' || data.targetRole === role;

        if (
          isPersonal ||
          (isRoleMatch && isAllStore) ||
          (isRoleMatch && isStoreMatch)
        ) {
          notifications.push(data);
        }
      });
    }
  } catch(e) {}

  // 新しい順に並び替え
  notifications.sort((a, b) => {
    const aTime = a.createdAt?.toDate?.()?.getTime() || 0;
    const bTime = b.createdAt?.toDate?.()?.getTime() || 0;
    return bTime - aTime;
  });

  if (notifications.length === 0) {
    listEl.innerHTML = `
      <div style="padding:40px;text-align:center;
        color:var(--text-muted);font-size:13px;">
        <i class="fa-solid fa-bell-slash"
          style="font-size:32px;margin-bottom:8px;display:block;"></i>
        ${(LANG_TEXTS[currentLang]||LANG_TEXTS['ja']).noNotif}
      </div>`;
    return;
  }

  const typeIcons = {
    new_video:     'fa-video',
    video_updated: 'fa-pencil',
    new_task:      'fa-list-check',
    task_watched:  'fa-eye',
    feedback:      'fa-comment-alt',
    default:       'fa-bell'
  };
  const typeColors = {
    new_video:     'var(--primary)',
    video_updated: 'var(--info)',
    new_task:      'var(--success)',
    task_watched:  'var(--warning)',
    feedback:      'var(--accent)',
    default:       'var(--text-muted)'
  };

  listEl.innerHTML = notifications.map(n => {
    const icon = typeIcons[n.type] || typeIcons.default;
    const color = typeColors[n.type] || typeColors.default;

    // 時刻表示
    const nt = LANG_TEXTS[currentLang] || LANG_TEXTS['ja'];
    const timeStr = (() => {
      if (!n.createdAt?.toDate) return '';
      const d = n.createdAt.toDate();
      const now = new Date();
      const diff = now - d;
      const mins = Math.floor(diff / 60000);
      const hours = Math.floor(diff / 3600000);
      const days = Math.floor(diff / 86400000);
      if (mins < 1) return nt.justNow;
      if (mins < 60) return mins + nt.minsAgo;
      if (hours < 24) return hours + nt.hoursAgo;
      if (days < 7) return days + nt.daysAgo;
      return d.toLocaleDateString('ja-JP', {
        month: 'numeric', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    })();

    return `
      <div onclick="handleNotificationTap('${n.type}','${n.videoId||''}','${n.videoChannel||''}')"
        style="padding:12px;
        border-bottom:1px solid var(--border-light,#F3F4F6);
        display:flex;gap:10px;cursor:pointer;
        ${n.read ? 'opacity:0.5;' : 'background:white;'}">
        <div style="width:36px;height:36px;border-radius:50%;
          background:${color}20;display:flex;align-items:center;
          justify-content:center;flex-shrink:0;">
          <i class="fa-solid ${icon}"
            style="color:${color};font-size:14px;"></i>
        </div>
        <div style="flex:1;">
          <div style="font-size:13px;margin-bottom:4px;
            font-weight:${n.read ? '400' : '600'};">
            ${n.message || ''}
          </div>
          <div style="font-size:11px;color:var(--text-muted);">
            ${timeStr}
          </div>
          ${n.type === 'new_task' ? `
            <button onclick="closeNotificationDrawer();navigateStaff('tasks')"
              style="margin-top:6px;padding:4px 10px;
              background:var(--primary);color:white;border:none;
              border-radius:var(--radius-sm);font-size:11px;
              font-weight:600;cursor:pointer;font-family:var(--font);">
              ${(LANG_TEXTS[currentLang]||LANG_TEXTS['ja']).checkTask}
            </button>` : ''}
        </div>
      </div>`;
  }).join('');

  // 未読件数をバッジに反映
  const unread = notifications.filter(n => !n.read).length;
  updateNotificationBadge(unread);
}

function updateNotificationBadge(count) {
  document.querySelectorAll('.notification-badge').forEach(el => el.remove());
  if (count <= 0) return;

  document.querySelectorAll('[onclick="openNotificationDrawer()"]').forEach(btn => {
    const badge = document.createElement('span');
    badge.className = 'notification-badge';
    badge.textContent = count > 9 ? '9+' : count;
    badge.style.cssText = `
      position:absolute;top:-4px;right:-4px;
      background:var(--danger);color:white;
      border-radius:50%;width:18px;height:18px;
      font-size:10px;font-weight:700;
      display:flex;align-items:center;justify-content:center;`;
    btn.style.position = 'relative';
    btn.appendChild(badge);
  });
}
function openFeedbackModal(videoId, videoTitle) {
  let modal = document.getElementById('feedback-modal');
  if (modal) modal.remove();

  modal = document.createElement('div');
  modal.id = 'feedback-modal';
  modal.style.cssText = `
    position:fixed;top:0;left:0;width:100%;height:100%;
    background:rgba(0,0,0,0.5);z-index:2000;
    display:flex;align-items:flex-end;justify-content:center;`;

  const t = LANG_TEXTS[currentLang] || LANG_TEXTS['ja'];

  const stamps = [
    { emoji:'😊', label:'わかった！' },
    { emoji:'🤔', label:'難しい…' },
    { emoji:'😮', label:'すごい！' },
    { emoji:'😢', label:'もっと教えて' },
    { emoji:'❤️', label:'好き！' },
    { emoji:'😐', label:'普通' },
  ];

  modal.innerHTML = `
    <div style="background:white;border-radius:16px 16px 0 0;
      width:100%;max-width:480px;padding:20px 16px 40px;
      max-height:85vh;overflow-y:auto;">

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div style="font-size:15px;font-weight:700;">${t.reactionTitle}</div>
        <button onclick="document.getElementById('feedback-modal').remove()" style="
          background:none;border:none;cursor:pointer;font-size:20px;color:var(--text-muted);">
          <i class="fa-solid fa-times"></i>
        </button>
      </div>

      <!-- スタンプ -->
      <div style="font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:8px;">
        ${t.stampLabel}
      </div>
      <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:16px;">
        ${stamps.map((s,i) => `
          <div onclick="selectStamp(this,'${s.emoji}','${s.label}')" id="stamp-${i}"
            style="display:flex;flex-direction:column;align-items:center;gap:4px;
            padding:8px 4px;border-radius:var(--radius-md);border:2px solid transparent;
            cursor:pointer;transition:all 0.15s;">
            <div style="font-size:28px;line-height:1;">${s.emoji}</div>
            <div style="font-size:10px;color:var(--text-muted);text-align:center;">${s.label}</div>
          </div>`).join('')}
      </div>

      <!-- テキストリアクション -->
      <div style="font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:8px;">
        ${t.msgLabel}
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;">
        ${[t.fb1, t.fb2, t.fb3, t.fb4].map(text => `
          <button onclick="selectFeedback(this,'${text}')" style="
            padding:10px 12px;background:var(--bg);border:1.5px solid var(--border);
            border-radius:var(--radius-sm);font-family:var(--font);
            font-size:13px;cursor:pointer;text-align:left;
            transition:all 0.15s;">
            ${text}
          </button>`).join('')}
      </div>

      <!-- 自由記述 -->
      <div style="margin-bottom:16px;">
        <textarea id="feedback-text" rows="2"
          placeholder="${t.fbPlaceholder}"
          style="width:100%;padding:10px 12px;border:1.5px solid var(--border);
          border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;
          outline:none;resize:none;"></textarea>
      </div>

      <div style="display:flex;gap:8px;">
        <button onclick="sendVideoFeedback('${videoId}','${videoTitle}')" style="
          flex:1;padding:12px;background:var(--primary);color:white;
          border:none;border-radius:var(--radius-sm);font-family:var(--font);
          font-size:14px;font-weight:700;cursor:pointer;">
          ${t.send}
        </button>
        <button onclick="document.getElementById('feedback-modal').remove()" style="
          padding:12px 16px;background:white;color:var(--text-secondary);
          border:1px solid var(--border);border-radius:var(--radius-sm);
          font-family:var(--font);font-size:13px;cursor:pointer;">
          ${t.cancel}
        </button>
      </div>
    </div>`;

  document.body.appendChild(modal);
  window._selectedStamp = '';
  window._selectedFeedbackText = '';
}

function selectStamp(el, emoji, label) {
  document.querySelectorAll('[id^="stamp-"]').forEach(s => {
    s.style.borderColor = 'transparent';
    s.style.background = 'none';
  });
  el.style.borderColor = 'var(--primary)';
  el.style.background = 'var(--primary-light)';
  window._selectedStamp = emoji + ' ' + label;
}

function selectFeedback(btn, text) {
  document.querySelectorAll('#feedback-modal button[onclick^="selectFeedback"]').forEach(b => {
    b.style.borderColor = 'var(--border)';
    b.style.background = 'var(--bg)';
    b.style.color = 'var(--text-primary)';
  });
  btn.style.borderColor = 'var(--primary)';
  btn.style.background = 'var(--primary-light)';
  btn.style.color = 'var(--primary)';
  window._selectedFeedbackText = text;
}

async function sendVideoFeedback(videoId, videoTitle) {
  const selected = window._selectedFeedbackText || '';
  const freeText = document.getElementById('feedback-text')?.value.trim() || '';
  const message = [window._selectedStamp, selected, freeText].filter(Boolean).join(' / ');

  if (!message) {
    showToast((LANG_TEXTS[currentLang]||LANG_TEXTS['ja']).selectReaction, 'error');
    return;
  }

  try {
    if (window._addDoc && window._collection) {
      await window._addDoc(
        window._collection(window._db, 'videoFeedbacks'), {
          videoId,
          videoTitle,
          message,
          fromUserId: currentUser?.uid,
          fromUserName: currentUser?.name,
          storeId: currentUser?.storeId,
          companyId: currentUser?.companyId || 'company_001',
          read: false,
          createdAt: window._serverTimestamp()
        }
      );
      await window._addDoc(
        window._collection(window._db, 'notifications'), {
          type: 'video_feedback',
          message: `${currentUser?.name}が「${videoTitle}」に：「${message}」`,
          companyId: currentUser?.companyId || 'company_001',
          targetRole: 'manager',
          read: false,
          createdAt: window._serverTimestamp()
        }
      );
    }
    document.getElementById('feedback-modal')?.remove();
    showToast((LANG_TEXTS[currentLang]||LANG_TEXTS['ja']).reactionSent);
  } catch(e) {
    showToast('送信に失敗しました', 'error');
  }
}

function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  if (!sidebar) return;
  const isOpen = sidebar.classList.contains('open');
  if (isOpen) {
    sidebar.classList.remove('open');
    overlay?.classList.remove('show');
  } else {
    sidebar.classList.add('open');
    overlay?.classList.add('show');
  }
}

function closeSidebar() {
  document.getElementById('sidebar')?.classList.remove('open');
  document.getElementById('sidebar-overlay')?.classList.remove('show');
}

function changeLang(lang) {
  currentLang = lang;
  const t = LANG_TEXTS[lang] || LANG_TEXTS['ja'];

  // ボトムタブのラベルを更新
  const tabIcons = {
    feed: 'fa-play', tasks: 'fa-list-check', mypage: 'fa-user'
  };
  const tabKeys = { feed: t.feed, tasks: t.tasks, mypage: t.mypage };
  Object.entries(tabKeys).forEach(([key, label]) => {
    const tab = document.getElementById('tab-' + key);
    if (tab) {
      tab.innerHTML = `
        <i class="fa-solid ${tabIcons[key]}" style="font-size:20px;"></i>
        <span style="font-size:10px;">${label}</span>`;
    }
  });

  // 検索プレースホルダー
  const searchInput = document.getElementById('feed-search');
  if (searchInput) searchInput.placeholder = t.search;

  // ジャンル「全て」ボタン
  const genreAllBtn = document.getElementById('genre-all');
  if (genreAllBtn) genreAllBtn.textContent = t.genreAll;

  // タスクフィルタータブ
  const taskTabMap = {
    'all': t.tabAll,
    'unwatched': t.tabUnwatched,
    'watched': t.tabWatched,
    'confirmed': t.tabConfirmed
  };
  Object.entries(taskTabMap).forEach(([key, label]) => {
    const btn = document.getElementById('task-tab-' + key);
    if (btn) btn.textContent = label;
  });

  // タスク一覧内のステータスラベル・ボタンを更新
  document.querySelectorAll('[data-status-label]').forEach(el => {
    const status = el.dataset.statusLabel;
    if (status === 'unwatched') el.textContent = t.unwatched;
    if (status === 'watched') el.textContent = t.watched;
    if (status === 'confirmed') el.textContent = t.confirmed;
  });
  document.querySelectorAll('[data-watch-now]').forEach(el => {
    el.innerHTML = `<i class="fa-solid fa-play"></i> ${t.watchNow}`;
  });

  // タスクサマリーのラベル
  document.querySelectorAll('[data-summary-label]').forEach(el => {
    const key = el.dataset.summaryLabel;
    if (key === 'unwatched') el.textContent = t.unwatched;
    if (key === 'watched') el.textContent = t.watched;
    if (key === 'confirmed') el.textContent = t.confirmed;
  });

  // スキルレベルタイトル
  const skillTitle = document.getElementById('skill-level-title');
  if (skillTitle) skillTitle.textContent = t.skillLevel;

  // マイページボタン
  const likedBtn = document.getElementById('btn-liked');
  if (likedBtn) likedBtn.innerHTML = `<i class="fa-solid fa-heart"></i> ${t.liked}`;
  const savedBtn = document.getElementById('btn-saved');
  if (savedBtn) savedBtn.innerHTML = `<i class="fa-solid fa-bookmark"></i> ${t.saved}`;

  // ログアウトボタン（マイページ）
  document.querySelectorAll('[data-logout-btn]').forEach(el => {
    el.innerHTML = `<i class="fa-solid fa-sign-out-alt"></i> ${t.logout}`;
  });

  // langセレクトの値を同期
  const sel = document.getElementById('lang-select');
  if (sel) sel.value = lang;

  // 現在表示中のページを再レンダリングして反映
  const content = document.getElementById('main-content');
  if (content && currentPage) {
    if (currentPage === 'tasks') renderTasks(content);
    else if (currentPage === 'mypage') renderMypage(content);
    else if (currentPage === 'feed') renderFeed(content);
  }

  // フィード内のiframeの字幕言語を切り替え
  const langMap = {
    ja: 'ja', en: 'en', vi: 'vi', my: 'my', ne: 'ne'
  };
  const ccLang = langMap[lang] || 'ja';

  document.querySelectorAll('#feed-slides iframe').forEach(iframe => {
    try {
      const src = iframe.src;
      const newSrc = src
        .replace(/cc_lang_pref=[^&]*/,  'cc_lang_pref=' + ccLang)
        .replace(/cc_load_policy=[^&]*/, 'cc_load_policy=1');
      if (newSrc !== src) iframe.src = newSrc;
    } catch(e) {}
  });
}
async function generateInvite(role) {
  if (!currentUser) return;
  const token = Math.random().toString(36).slice(2) + Date.now().toString(36);

  try {
    if (window._setDoc && window._doc) {
      await window._setDoc(
        window._doc(window._db, 'invites', token), {
          token,
          role,
          companyId: currentUser.companyId || 'company_001',
          storeId: currentUser.storeId || 'store_001',
          storeName: currentUser.storeName || '',
          createdBy: currentUser.uid,
          used: false,
          createdAt: window._serverTimestamp()
        }
      );
    }
    const url = `${location.origin}${location.pathname}?invite=${token}`;
    const resultId = `invite-result-${role}`;
    const resultEl = document.getElementById(resultId)
      || document.getElementById('invite-result');

    if (resultEl) {
      resultEl.innerHTML = `
        <div style="background:var(--primary-light);border-radius:var(--radius-md);
          padding:12px;">
          <div style="font-size:11px;color:var(--text-secondary);margin-bottom:6px;">
            ${role === 'manager' ? '店長用' : 'スタッフ用'}招待リンク
          </div>
          <div style="font-size:11px;word-break:break-all;
            color:var(--primary);margin-bottom:10px;">${url}</div>
          <button onclick="navigator.clipboard.writeText('${url}')
            .then(()=>showToast('コピーしました'))" style="
            padding:6px 14px;background:var(--primary);color:white;border:none;
            border-radius:var(--radius-sm);font-family:var(--font);
            font-size:12px;cursor:pointer;">
            <i class="fa-solid fa-copy"></i> コピー
          </button>
        </div>`;
    }
    showToast('招待リンクを発行しました');
  } catch(e) {
    showToast('発行に失敗しました: ' + e.message, 'error');
  }
}
async function submitVideo() {
  const title = document.getElementById('up-title')?.value.trim();
  const channel = document.getElementById('up-channel')?.value;
  const genre = document.getElementById('up-genre')?.value;
  const desc = document.getElementById('up-desc')?.value.trim();
  const isOnboarding = document.getElementById('up-onboarding')?.checked || false;
  const videoUrl = document.getElementById('up-video-url')?.value.trim();
  const thumbUrl = document.getElementById('up-thumb-url')?.value.trim();

  if (!title) { showToast('タイトルを入力してください', 'error'); return; }
  if (!videoUrl) { showToast('YouTube URLを入力してください', 'error'); return; }

  function extractYouTubeId(url) {
    const patterns = [
      /youtube\.com\/watch\?v=([^&]+)/,
      /youtu\.be\/([^?]+)/,
      /youtube\.com\/shorts\/([^?]+)/,
      /youtube\.com\/embed\/([^?]+)/
    ];
    for (const p of patterns) {
      const m = url.match(p);
      if (m) return m[1];
    }
    return null;
  }

  const youtubeId = extractYouTubeId(videoUrl);
  if (!youtubeId) {
    showToast('有効なYouTube URLを入力してください', 'error');
    return;
  }

  const thumbnailURL = thumbUrl ||
    `https://img.youtube.com/vi/${youtubeId}/hqdefault.jpg`;
  const embedURL = `https://www.youtube.com/embed/${youtubeId}?autoplay=1&loop=1&playlist=${youtubeId}&mute=1&cc_load_policy=1&cc_lang_pref=ja`;

  const submitBtn = document.querySelector('[onclick="submitVideo()"]');
  if (submitBtn) { submitBtn.textContent = '投稿中...'; submitBtn.disabled = true; }

  try {
    const isHQ = currentUser?.role === 'headquarters';
    const companyId = currentUser?.companyId || 'company_001';

    const videoData = {
      title,
      channel: channel || 'common',
      genre: genre || 'その他',
      description: desc || '',
      isOnboarding,
      type: isHQ ? 'official' : 'field',
      videoURL: embedURL,
      youtubeId,
      thumbnailURL,
      companyId,
      storeId: isHQ ? null : (currentUser?.storeId || 'store_001'),
      storeName: isHQ ? '本部' : (currentUser?.storeName || ''),
      uploadedBy: currentUser?.uid || '',
      uploaderName: currentUser?.name || '',
      likes: 0,
      views: 0,
      isOfficial: isHQ,
      published: true,
      status: 'published',
      createdAt: window._serverTimestamp ? window._serverTimestamp() : new Date()
    };

    if (window._addDoc && window._collection) {
      const videoRef = await window._addDoc(
        window._collection(window._db, 'videos'),
        videoData
      );
      const newVideoId = videoRef.id;

      const notifChannel = channel || 'common';
      const uploaderStoreId = currentUser?.storeId || '';
      const uploaderName = currentUser?.name || '';

      if (!isHQ) {
        // 店長投稿：本部への審査申請通知
        await window._addDoc(
          window._collection(window._db, 'notifications'), {
            type: 'video_request',
            videoId: newVideoId,
            videoChannel: notifChannel,
            message: `【動画申請】${currentUser?.storeName||''}の${uploaderName}が「${title}」を申請しました`,
            companyId,
            targetRole: 'headquarters',
            targetStoreId: null,
            read: false,
            createdAt: window._serverTimestamp()
          }
        );
      }

      // 全員への動画通知（本部・店長どちらの投稿も）
      if (notifChannel === 'store') {
        // 店舗ストック：同じ店舗のメンバーに通知
        await window._addDoc(
          window._collection(window._db, 'notifications'), {
            type: 'new_video',
            videoId: newVideoId,
            videoChannel: notifChannel,
            message: `【店舗ストック更新】${uploaderName}が「${title}」を投稿しました`,
            companyId,
            targetRole: 'all',
            targetStoreId: uploaderStoreId,
            read: false,
            createdAt: window._serverTimestamp()
          }
        );
      } else {
        // 全店共通・広報：全ロール全員に通知
        await window._addDoc(
          window._collection(window._db, 'notifications'), {
            type: 'new_video',
            videoId: newVideoId,
            videoChannel: notifChannel,
            message: `【新着動画】${uploaderName}が「${title}」を投稿しました`,
            companyId,
            targetRole: 'all',
            targetStoreId: null,
            read: false,
            createdAt: window._serverTimestamp()
          }
        );
      }
    }

    showToast('投稿しました ✅');
    document.getElementById('up-title').value = '';
    document.getElementById('up-desc').value = '';
    document.getElementById('up-video-url').value = '';
    if (document.getElementById('up-thumb-url'))
      document.getElementById('up-thumb-url').value = '';

  } catch(e) {

    showToast('投稿に失敗しました: ' + e.message, 'error');
  } finally {
    if (submitBtn) { submitBtn.textContent = '投稿する'; submitBtn.disabled = false; }
  }
}
function logout() { location.reload(); }

showLoginScreen();
</script>

<script type="module">

const app = initializeApp(firebaseConfig);

    await signInWithPopup(auth, provider);
  } catch(e) {
    alert('ログインに失敗しました: ' + e.message);
  }

    await signOut(auth);

onAuthStateChanged(auth, async (firebaseUser) => {
  if (!firebaseUser) {
    showLoginScreen();
    return;
  }
  try {
    const userSnap = await getDoc(doc(db, "users", firebaseUser.uid));
    if (userSnap.exists()) {
      const userData = userSnap.data();
      currentUser = { ...userData, uid: firebaseUser.uid };
      initApp(userData.role || 'staff');
    } else {
      const token = new URLSearchParams(window.location.search).get('invite');
      if (token) {
        const inviteSnap = await getDoc(doc(db, "invites", token));
        if (!inviteSnap.exists() || inviteSnap.data().used) {
          alert('招待リンクが無効または使用済みです');
          showLoginScreen();
          return;
        }
        const invite = inviteSnap.data();
        const userData = {
          uid: firebaseUser.uid,
          name: firebaseUser.displayName || '未設定',
          email: firebaseUser.email || '',
          photoURL: firebaseUser.photoURL || '',
          role: invite.role,
          companyId: invite.companyId,
          storeId: invite.storeId,
          storeName: invite.storeName || '',
          createdAt: serverTimestamp(),
          lastLoginAt: serverTimestamp()
        };
        await setDoc(doc(db, "users", firebaseUser.uid), userData);
        await updateDoc(doc(db, "invites", token), { used: true });
        currentUser = { ...userData, uid: firebaseUser.uid };

            </button>
          </div>`;
      }
    }
  } catch(e) {

    showLoginScreen();
  }
});
</script>
